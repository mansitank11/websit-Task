<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D74A15"/>
      <stop offset="50%"  stop-color="#EAA82C"/>
      <stop offset="100%" stop-color="#F3C04F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#EAA82C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D74A15" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#EAA82C" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Soft ambient glow -->
  <circle cx="50" cy="50" r="46" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#lg1)" stroke-width="1.2" opacity="0.5"/>

  <!-- Spice leaf body -->
  <path d="M50 14
             C66 28, 76 48, 76 67
             C76 80, 64 87, 50 87
             C36 87, 24 80, 24 67
             C24 48, 34 28, 50 14 Z"
        fill="none"
        stroke="url(#lg1)"
        stroke-width="4.5"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Vertical vein / spine -->
  <line x1="50" y1="14" x2="50" y2="60"
        stroke="url(#lg1)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Crossbar (letter A crossbar feel) -->
  <path d="M33 62 C41 57, 59 57, 67 62"
        fill="none"
        stroke="url(#lg1)"
        stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Small accent dot at top -->
  <circle cx="50" cy="14" r="3" fill="#F3C04F" opacity="0.9"/>
</svg>
